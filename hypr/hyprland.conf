# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

################
### MONITORS ###
################

# See https://wiki.hypr.la60Configuring/Monitors/
monitor=eDP-1, preferred, auto, 1.333333
monitor=DP-1, preferred, auto, auto, mirror, eDP-1
# env = GDK_SCALE,2


xwayland {
  force_zero_scaling = true
  
}

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun
$browser = firefox


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = xhost +SI:localuser:root
exec-once = hyprpaper 
exec-once = waybar
exec-once = hyprsunset
# exec-once = rclone mount midrive: ~/google-drive &
# exec-once = swayosd-server & swaync
exec-once = wl-paste --watch cliphist store
# exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = systemctl --user start hyprpolkitagent
exec-once = udiskie --notify --tray


